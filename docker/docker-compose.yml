services:
  node0:
    image: proof-net
    command: ["/node", "0", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../messages/node0:/app/messages
      - ../state/node0:/app/state
      - ../receipts/node0:/app/receipts
      - ../keys/pvt/node0.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node1:
    image: proof-net
    command: ["/node", "1", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../messages/node1:/app/messages
      - ../state/node1:/app/state
      - ../receipts/node1:/app/receipts
      - ../keys/pvt/node1.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node2:
    image: proof-net
    command: ["/node", "2", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../messages/node2:/app/messages
      - ../state/node2:/app/state
      - ../receipts/node2:/app/receipts
      - ../keys/pvt/node2.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node3:
    image: proof-net
    command: ["/node", "3", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../messages/node3:/app/messages
      - ../state/node3:/app/state
      - ../receipts/node3:/app/receipts
      - ../keys/pvt/node3.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  acct0:
    image: proof-net
    command: ["/acct", "1000", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../state/acct0:/app/state
      - ../keys/pvt/acct0.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  acct1:
    image: proof-net
    command: ["/acct", "1001", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../state/acct1:/app/state
      - ../keys/pvt/acct1.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
