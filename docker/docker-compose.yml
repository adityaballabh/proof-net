services:
  node0:
    image: proof-net
    command: ["/node", "0", "nw_config.txt"]
    volumes:
      - ../receipts/0:/app/receipts
      - ../keys/pvt/0.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node1:
    image: proof-net
    command: ["/node", "1", "nw_config.txt"]
    volumes:
      - ../receipts/1:/app/receipts
      - ../keys/pvt/1.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node2:
    image: proof-net
    command: ["/node", "2", "nw_config.txt"]
    volumes:
      - ../receipts/2:/app/receipts
      - ../keys/pvt/2.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  node3:
    image: proof-net
    command: ["/node", "3", "nw_config.txt"]
    volumes:
      - ../receipts/3:/app/receipts
      - ../keys/pvt/3.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
  acct0:
    image: proof-net
    command: ["/acct", "1000", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../keys/pvt/1000.key:/app/keys/pvt.key:ro
      - ../keys/pub:/app/keys/pub:ro
      - ../state/acct0:/app/state
  acct1:
    image: proof-net
    command: ["/acct", "1001", "nw_config.txt", "acct_config.txt"]
    volumes:
      - ../keys/pvt/1001.key:/app/keys/pvt.key:ro
      - ../state/acct1:/app/state
